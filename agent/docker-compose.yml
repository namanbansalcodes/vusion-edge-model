version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: store_142_db
    environment:
      MYSQL_ROOT_PASSWORD: retailagent
      MYSQL_DATABASE: store_142
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci